<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>How to edit scheduled Bill Payments on the Mobile App | CW Banking Guide</title>
    <link rel="stylesheet" href="../../css/guide.css">
    <link rel="icon" type="image/png" sizes="32x32" href="../../favicon-32x32.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>
    <nav class="mobile-topnav">
        <a href="../../index.html">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            Back to All Guides
        </a>
    </nav>
    <div class="container">
        <div class="header">
            <div class="icon-wrapper">
                <div class="icon-circle">
                    <img src="https://t1.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://centralwcu.org&size=64" alt="Central Willamette CU">
                </div>
            </div>
            <div class="header-content">
                <h1>How to edit scheduled Bill Payments on the Mobile App</h1>
                <p class="description">This guide is designed to help you edit or delete scheduled bill payments on the mobile app.</p>
            </div>
        </div>
        
        <div class="steps">
            <!-- Step 1 -->
            <div class="step-card">
                <div class="step-header">
                    <span class="step-number">1</span>
                    <div class="step-text">
                        <strong>Tap &quot;Move Money&quot;</strong>
                    </div>
                </div>
            <div class="step-image">
                    <div class="image-container">
                        <img src="../../images/guides/edit-scheduled-bill-payments/step-01.jpeg" alt="Step 1: Tap &quot;Move Money&quot;">
                    </div>
                </div>
            </div>
            <!-- Step 2 -->
            <div class="step-card">
                <div class="step-header">
                    <span class="step-number">2</span>
                    <div class="step-text">
                        <strong>Tap &quot;External Transfers &amp; Payments&quot;</strong>
                    </div>
                </div>
            <div class="step-image">
                    <div class="image-container">
                        <img src="../../images/guides/edit-scheduled-bill-payments/step-02.jpeg" alt="Step 2: Tap &quot;External Transfers &amp; Payments&quot;">
                    </div>
                </div>
            </div>
            <!-- Step 3 -->
            <div class="step-card">
                <div class="step-header">
                    <span class="step-number">3</span>
                    <div class="step-text">
                        <strong>Tap the scheduled Bill Payment to delete or edit</strong>
                    </div>
                </div>
            <div class="step-image">
                    <div class="image-container">
                        <img src="../../images/guides/edit-scheduled-bill-payments/step-03.jpeg" alt="Step 3: Tap the scheduled Bill Payment to delete or edit">
                    </div>
                </div>
            </div>
            <!-- Step 4 -->
            <div class="step-card">
                <div class="step-header">
                    <span class="step-number">4</span>
                    <div class="step-text">
                        <strong>Tap Delete or Edit</strong>
                    </div>
                </div>
            <div class="step-image">
                    <div class="image-container">
                        <img src="../../images/guides/edit-scheduled-bill-payments/step-04.jpeg" alt="Step 4: Tap Delete or Edit">
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
